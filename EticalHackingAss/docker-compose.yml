networks:
  edu_net:
    driver: bridge

services:
  web_portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myeduconnect_web
    ports:
      - "80:80" 
    volumes:
      - ./src:/var/www/html
    networks:
      - edu_net
    depends_on:
      - db_server

  db_server:
    image: mysql:5.7
    container_name: myeduconnect_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes" 
      MYSQL_DATABASE: myeduconnect
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - edu_net
