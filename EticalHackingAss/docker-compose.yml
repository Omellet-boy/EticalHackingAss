# MyEduConnect Docker setup:
# - ./src is the web root mounted to /var/www/html in the web container.
# - ./db/init.sql seeds the myeduconnect MySQL database on startup.
networks:
  edu_net:
    driver: bridge

services:
  # Web Portal Container (Your workspace for sniffing / Member 2's workspace for coding)
  web_portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myeduconnect_web
    ports:
      - "80:80" # Exposed on unencrypted port 80 for sniffing phase
    volumes:
      - ./src:/var/www/html
    networks:
      - edu_net
    depends_on:
      - db_server

  # Database Container (Member 3's workspace for database configuration)
  db_server:
    image: mysql:5.7
    container_name: myeduconnect_db
    ports:
      - "3306:3306" # Exposed to allow network scanning
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123 # VULN: Predictable credential
      MYSQL_DATABASE: myeduconnect
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - edu_net